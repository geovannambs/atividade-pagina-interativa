<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade DOM - Ordenação</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .bloco { border: 1px solid #000; padding: 15px; margin-bottom: 15px; background: #fff; }
        #contador-texto { font-weight: bold; margin: 0 10px; font-size: 20px; }
        button { cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

    <div class="bloco">
        <h3>Contador</h3>
        <button onclick="diminuir()">-</button>
        <span id="contador-texto">0</span>
        <button onclick="aumentar()">+</button>
    </div>

    <div class="bloco">
        <h3>Texto Dinâmico</h3>
        <input type="text" id="campo-input" oninput="atualizarLetras()">
        <p id="contagem-letras">Caracteres (sem espaço): 0</p>
        <div id="lista-paragrafos"></div>
    </div>

    <div class="bloco">
        <h3>Gerador de Listas</h3>
        <input type="text" id="item-lista" placeholder="Digite algo...">
        <select id="tipo-lista">
            <option value="ol">Lista Ordenada</option>
            <option value="ul">Lista Não Ordenada</option>
        </select>
        <button onclick="adicionarNaLista()">Adicionar Item</button>
        <button onclick="ordenarLista()" style="background-color: #e0e0e0;">Ordenar Agora</button>
        <div id="area-listas"></div>
    </div>

    <button onclick="resetarTudo()" style="background-color: lightcoral;">Limpar Tudo</button>

    <script src="script.js"></script>
</body>
</html>
