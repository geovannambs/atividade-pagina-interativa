<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Atividade DOM - Ordenação</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .bloco { border: 1px solid #000; padding: 15px; margin-bottom: 15px; background: #fff; }
        #contador-texto { font-weight: bold; margin: 0 10px; font-size: 20px; }
        button { cursor: pointer; margin: 5px; }
    </style>
</head>
<body>

    <div class="bloco">
        <h3>Contador</h3>
        <button onclick="diminuir()">-</button>
        <span id="contador-texto">0</span>
        <button onclick="aumentar()">+</button>
    </div>

    <div class="bloco">
        <h3>Texto Dinâmico</h3>
        <input type="text" id="campo-input" oninput="atualizarLetras()">
        <p id="contagem-letras">Caracteres (sem espaço): 0</p>
        <div id="lista-paragrafos"></div>
    </div>

    <div class="bloco">
        <h3>Gerador de Listas</h3>
        <input type="text" id="item-lista" placeholder="Digite algo...">
        <select id="tipo-lista" onchange="mudarEstiloLista()">
            <option value="1">Lista Numérica (1, 2, 3)</option>
            <option value="a">Lista Alfabética (a, b, c)</option>
        </select>
        <button onclick="adicionarNaLista()">Adicionar Item</button>
        <button onclick="ordenarLista()" style="background-color: #e0e0e0;">Ordenar Agora</button>
        
        <div id="area-listas">
            <ol id="minha-lista-dinamica" type="1"></ol>
        </div>
    </div>

    <button onclick="resetarTudo()" style="background-color: lightcoral;">Limpar Tudo</button>

    <script>
        let numero = 0;

        function aumentar() {
            numero++;
            document.getElementById('contador-texto').innerText = numero;
        }

        function diminuir() {
            if (numero > 0) {
                numero--;
                document.getElementById('contador-texto').innerText = numero;
            } else {
                alert("O contador já está em zero");
            }
        }

        function atualizarLetras() {
            let valor = document.getElementById('campo-input').value;
            let semEspaco = valor.replace(/\s/g, '').length;
            document.getElementById('contagem-letras').innerText = "Caracteres (sem espaço): " + semEspaco;
        }

        document.getElementById('campo-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value !== "") {
                let p = document.createElement('p');
                p.innerText = this.value;
                document.getElementById('lista-paragrafos').appendChild(p);
                this.value = "";
                atualizarLetras();
            }
        });

        function mudarEstiloLista() {
            let marcador = document.getElementById('tipo-lista').value;
            document.getElementById('minha-lista-dinamica').type = marcador;
        }

        function adicionarNaLista() {
            let input = document.getElementById('item-lista');
            if (input.value === "") return;

            let li = document.createElement('li');
            li.innerText = input.value;
            document.getElementById('minha-lista-dinamica').appendChild(li);
            input.value = "";
        }

        function ordenarLista() {
            let lista = document.getElementById('minha-lista-dinamica');
            let itens = Array.from(lista.getElementsByTagName('li'));

            itens.sort((a, b) => {
                let textoA = a.innerText.trim();
                let textoB = b.innerText.trim();

                // Se ambos forem números, ordena do menor para o maior
                if (!isNaN(textoA) && !isNaN(textoB) && textoA !== "" && textoB !== "") {
                    return Number(textoA) - Number(textoB);
                }

                // Se for texto, usa localeCompare (ignora maiúsculas/minúsculas e acentos)
                return textoA.localeCompare(textoB, 'pt-BR', { sensitivity: 'base' });
            });

            // Limpa a lista e coloca os itens ordenados
            lista.innerHTML = "";
            itens.forEach(item => lista.appendChild(item));
        }

        function resetarTudo() {
            numero = 0;
            document.getElementById('contador-texto').innerText = 0;
            document.getElementById('campo-input').value = "";
            document.getElementById('item-lista').value = "";
            document.getElementById('contagem-letras').innerText = "Caracteres (sem espaço): 0";
            document.getElementById('lista-paragrafos').innerHTML = "";
            document.getElementById('minha-lista-dinamica').innerHTML = "";
        }
    </script>
</body>
</html>
